services:
  pmhq:
    image: linyuchen/pmhq:7.3.2
    privileged: true
    environment:
      - ENABLE_HEADLESS=false
    networks:
      - app_network
    volumes:
      - qq_volume:/root/.config/QQ
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llbot:
    image: linyuchen/llbot:7.11.0
    ports:
      - "3080:3080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PMHQ_HOST=pmhq
      - WEBUI_PORT=3080
    networks:
      - app_network
    volumes:
      - qq_volume:/root/.config/QQ
      - ./llbot_config:/app/llbot/data:rw
      - ./QQRobot/carside_picture:/app/carside_picture
    depends_on:
      - pmhq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "ps | grep '[n]ode'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      
  my-robot:
    image: python:3.11-slim
    container_name: kiriko_robot
    env_file:
      - ./QQRobot/.env
    volumes:
      - ./QQRobot:/app
    working_dir: /app
    command: >
      sh -c "pip install flask requests python-dotenv && python main.py"
    networks:
      - app_network
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

volumes:
  qq_volume:

networks:
  app_network:
    driver: bridge
